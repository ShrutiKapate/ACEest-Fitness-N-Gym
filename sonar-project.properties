# =============================================================
# SonarQube scanner configuration for ACEest Fitness & Gym
# Run: sonar-scanner -Dsonar.host.url=http://<host>:9000 -Dsonar.login=<token>
# =============================================================

sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness and Gym
sonar.projectVersion=3.2.4

# --- Source layout ---
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# --- Python ---
sonar.python.version=3.10,3.11,3.12

# --- Test reports ---
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# --- Exclusions ---
sonar.exclusions=**/__pycache__/**,**/legacy_versions/**,**/templates/**
sonar.coverage.exclusions=tests/**,**/templates/**,legacy_versions/**

# --- Quality gate ---
# Use the default "Sonar way" gate, or specify your own:
# sonar.qualitygate.wait=true
