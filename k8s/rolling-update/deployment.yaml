apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness
  namespace: aceest
  labels: { app: aceest-fitness, strategy: rolling-update }
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: aceest-fitness }
  template:
    metadata:
      labels: { app: aceest-fitness, version: stable }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env:
            - { name: APP_VARIANT, value: "stable" }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
