apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-a
  namespace: aceest
  labels: { app: aceest-fitness, variant: a }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, variant: a }
  template:
    metadata:
      labels: { app: aceest-fitness, variant: a }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "a" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-b
  namespace: aceest
  labels: { app: aceest-fitness, variant: b }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, variant: b }
  template:
    metadata:
      labels: { app: aceest-fitness, variant: b }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "b" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness
  namespace: aceest
spec:
  type: NodePort
  selector: { app: aceest-fitness, variant: a }
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
