# ── A/B Testing Deployment ────────────────────────────────────────────────────
# Version A (control) vs Version B (variant)
# Traffic split is controlled via Ingress annotations (cookie / header based)
# ─────────────────────────────────────────────────────────────────────────────

# Version A — Control (stable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-a
  namespace: aceest
  labels:
    app: aceest
    version: a
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      version: a
  template:
    metadata:
      labels:
        app: aceest
        version: a
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:latest
          ports:
            - containerPort: 5000
          env:
            - name: AB_VERSION
              value: "A"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Version B — Variant (new features)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-b
  namespace: aceest
  labels:
    app: aceest
    version: b
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      version: b
  template:
    metadata:
      labels:
        app: aceest
        version: b
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:IMAGE_TAG
          ports:
            - containerPort: 5000
          env:
            - name: AB_VERSION
              value: "B"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Service A
apiVersion: v1
kind: Service
metadata:
  name: aceest-service-a
  namespace: aceest
spec:
  selector:
    app: aceest
    version: a
  ports:
    - port: 80
      targetPort: 5000
---
# Service B
apiVersion: v1
kind: Service
metadata:
  name: aceest-service-b
  namespace: aceest
spec:
  selector:
    app: aceest
    version: b
  ports:
    - port: 80
      targetPort: 5000
---
# Ingress with cookie-based A/B split (nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-ab-ingress
  namespace: aceest
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-cookie: "aceest_variant"
    # Users with cookie aceest_variant=B → routed to version B
    nginx.ingress.kubernetes.io/canary-weight: "50"
spec:
  rules:
    - host: aceest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-service-b
                port:
                  number: 80
