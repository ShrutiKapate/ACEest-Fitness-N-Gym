apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-blue
  namespace: aceest
  labels: { app: aceest-fitness, version: blue }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, version: blue }
  template:
    metadata:
      labels: { app: aceest-fitness, version: blue }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "blue" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  namespace: aceest
  labels: { app: aceest-fitness, version: green }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, version: green }
  template:
    metadata:
      labels: { app: aceest-fitness, version: green }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "green" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness
  namespace: aceest
spec:
  type: NodePort
  selector: { app: aceest-fitness, version: blue }
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
