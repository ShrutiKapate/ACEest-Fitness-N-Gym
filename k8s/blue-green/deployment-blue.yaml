# ── Blue Deployment (stable / current) ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
  labels:
    app: aceest
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      version: blue
  template:
    metadata:
      labels:
        app: aceest
        version: blue
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
