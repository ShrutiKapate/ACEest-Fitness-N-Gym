apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-primary
  namespace: aceest
  labels: { app: aceest-fitness, role: primary }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aceest-fitness, role: primary }
  template:
    metadata:
      labels: { app: aceest-fitness, role: primary }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "primary" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  namespace: aceest
  labels: { app: aceest-fitness, role: shadow }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aceest-fitness, role: shadow }
  template:
    metadata:
      labels: { app: aceest-fitness, role: shadow }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "shadow" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness
  namespace: aceest
spec:
  type: NodePort
  selector: { app: aceest-fitness, role: primary }
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
