# ── Shadow Deployment ─────────────────────────────────────────────────────────
# Production traffic goes only to stable.
# Shadow mirrors requests to shadow pods (via Istio / nginx mirror).
# Shadow responses are discarded — purely for validation.
# ─────────────────────────────────────────────────────────────────────────────

# Stable (production) deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
      track: stable
  template:
    metadata:
      labels:
        app: aceest
        track: stable
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Shadow deployment (receives mirrored traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  namespace: aceest
  annotations:
    description: "Shadow deployment — responses discarded, used for dark testing"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      track: shadow
  template:
    metadata:
      labels:
        app: aceest
        track: shadow
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:IMAGE_TAG
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Production service (stable only)
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
spec:
  selector:
    app: aceest
    track: stable
  ports:
    - port: 80
      targetPort: 5000
  type: LoadBalancer
---
# Shadow service (for mirroring)
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-service
  namespace: aceest
spec:
  selector:
    app: aceest
    track: shadow
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
---
# Nginx ConfigMap for traffic mirroring (alternative to Istio)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-mirror-config
  namespace: aceest
data:
  nginx.conf: |
    upstream stable {
        server aceest-service:80;
    }
    upstream shadow {
        server aceest-shadow-service:80;
    }
    server {
        listen 8080;
        location / {
            proxy_pass http://stable;
            mirror /shadow;
            mirror_request_body on;
        }
        location = /shadow {
            internal;
            proxy_pass http://shadow$request_uri;
        }
    }
