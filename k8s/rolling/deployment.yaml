# ── Rolling Update Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app
  namespace: aceest
  labels:
    app: aceest
    strategy: rolling
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Allow 1 extra pod during update
      maxUnavailable: 0  # Zero downtime
  template:
    metadata:
      labels:
        app: aceest
        version: "IMAGE_TAG"
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:IMAGE_TAG
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
spec:
  selector:
    app: aceest
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
