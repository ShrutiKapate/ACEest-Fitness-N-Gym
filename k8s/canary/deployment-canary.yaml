# ── Canary Deployment ─────────────────────────────────────────────────────────
# Stable: 4 replicas (80% traffic)  |  Canary: 1 replica (20% traffic)
# ─────────────────────────────────────────────────────────────────────────────

# Stable (existing) deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels:
    app: aceest
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest
      track: stable
  template:
    metadata:
      labels:
        app: aceest
        track: stable
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Canary (new version) deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels:
    app: aceest
    track: canary
spec:
  replicas: 1            # ~20% of total pods receive new version
  selector:
    matchLabels:
      app: aceest
      track: canary
  template:
    metadata:
      labels:
        app: aceest
        track: canary
    spec:
      containers:
        - name: aceest
          image: yourdockerhubuser/aceest-fitness:IMAGE_TAG
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
# Shared service — routes to BOTH stable and canary pods (same app label)
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
  annotations:
    deployment-strategy: "canary"
spec:
  selector:
    app: aceest           # Selects both stable AND canary pods
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
