apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest
  labels: { app: aceest-fitness, track: stable }
spec:
  replicas: 4
  selector:
    matchLabels: { app: aceest-fitness, track: stable }
  template:
    metadata:
      labels: { app: aceest-fitness, track: stable }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "stable" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
  namespace: aceest
  labels: { app: aceest-fitness, track: canary }
spec:
  replicas: 1
  selector:
    matchLabels: { app: aceest-fitness, track: canary }
  template:
    metadata:
      labels: { app: aceest-fitness, track: canary }
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports: [{ containerPort: 5000 }]
          env: [{ name: APP_VARIANT, value: "canary" }]
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness
  namespace: aceest
spec:
  type: NodePort
  selector: { app: aceest-fitness }
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30080
